# nginx HTTP/3 server for benchmarking - mirrors bench/h2o.conf: serves the same 1KB
# static file over HTTP/3 (QUIC) on :14434, 4 workers, no access logging (so the load
# generator, not server logging, is what we measure). Runs from the stock nginx image.
worker_processes 12;
error_log /dev/stderr warn;
events { worker_connections 8192; }
http {
    access_log off;
    default_type text/html;
    keepalive_requests 100000000;  # don't recycle the h3 connection mid-run (nginx default is 1000)
    server {
        http3 on;
        listen 14434 quic reuseport;   # HTTP/3 over QUIC (UDP)
        listen 14434 ssl;              # TLS/TCP, for h1/h2 fallback
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.3;
        add_header Alt-Svc 'h3=":14434"; ma=86400';
        root /doc_root;
        location / { }
    }
}
