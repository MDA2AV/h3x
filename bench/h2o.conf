# h2o server for benchmarking - serves a 1KB static file over HTTP/1, HTTP/2 (TCP+TLS)
# and HTTP/3 (QUIC), all on :14433. No access logging, so the load generator - not the
# server's logging - is what we measure.
listen: &ssl
  host: 0.0.0.0
  port: 14433
  ssl:
    certificate-file: /home/diogo/h3x/bench/server.crt
    key-file: /home/diogo/h3x/bench/server.key
    min-version: TLSv1.3
listen:
  <<: *ssl
  type: quic
num-threads: 12
hosts:
  "127.0.0.1:14433":
    paths:
      "/":
        file.dir: /home/diogo/h3x/bench/doc_root
error-log: /home/diogo/h3x/bench/error.log
