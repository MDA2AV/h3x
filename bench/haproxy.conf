# HAProxy HTTP/3 server for benchmarking - mirrors bench/h2o.conf and bench/nginx.conf: serves the
# same 1KB static file directly (no backend hop) over HTTP/3 (QUIC) on :14435, 4 threads, no access
# logging. Uses HAProxy's own QUIC stack (a third stack next to h2o's quicly and nginx's OpenSSL-QUIC).
global
    nbthread 12
    maxconn 200000

defaults
    mode http
    timeout client 30s
    timeout connect 5s
    timeout server 30s

frontend h3
    bind quic4@0.0.0.0:14435 ssl crt /etc/haproxy/certs/haproxy.pem alpn h3
    bind 0.0.0.0:14435 ssl crt /etc/haproxy/certs/haproxy.pem alpn h2,http/1.1
    # serve the 1KB file straight from HAProxy so we measure its h3 server, not a proxied backend
    http-request return status 200 content-type "text/html" file /doc_root/index.html
