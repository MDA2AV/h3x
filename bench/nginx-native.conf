# bench/nginx.conf adapted to run nginx natively on the host (no Docker): absolute host
# paths for cert/docroot, own pid file so it never fights the system nginx service.
# Needs an nginx built with http_v3_module (nginx.org >= 1.25; Ubuntu's 1.24 lacks it).
# Run:   sudo nginx -c /home/diogo/h3x/bench/nginx-native.conf -g 'daemon off;'
worker_processes 12;
error_log /dev/stderr warn;
pid /tmp/nginx-h3x.pid;
events { worker_connections 8192; }
http {
    access_log off;
    default_type text/html;
    keepalive_requests 100000000;  # don't recycle the h3 connection mid-run (nginx default is 1000)
    server {
        http3 on;
        listen 14434 quic reuseport;   # HTTP/3 over QUIC (UDP)
        listen 14434 ssl;              # TLS/TCP, for h1/h2 fallback
        ssl_certificate     /home/diogo/h3x/bench/server.crt;
        ssl_certificate_key /home/diogo/h3x/bench/server.key;
        ssl_protocols TLSv1.3;
        add_header Alt-Svc 'h3=":14434"; ma=86400';
        root /home/diogo/h3x/bench/doc_root;
        location / { }
    }
}
